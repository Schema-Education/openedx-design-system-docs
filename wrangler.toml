# Cloudflare Workers config for open-edx-design-system-poc.schema.education
#
# Lives at the repo root because Cloudflare Workers Builds runs
# `npx wrangler versions upload` from the repo root (not from `site/`).
# The `pnpm preview` / `pnpm deploy` scripts in `site/package.json` point
# at this file via `--config ../wrangler.toml`, so there is a single source
# of truth.
#
# This deploys the static Next.js export (`site/out/`) via Workers Static
# Assets. No Worker script is needed because the site is fully static —
# Pagefind handles search client-side, and Next is configured with
# `output: 'export'`.

name = "openedx-design-system-poc"
compatibility_date = "2025-05-01"

[assets]
directory = "./site/out"
# Serve out/404.html for unmatched routes (Next static export emits this).
not_found_handling = "404-page"

[observability]
enabled = true
