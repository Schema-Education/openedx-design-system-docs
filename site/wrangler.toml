# Cloudflare Workers config for open-edx-design-system-poc.schema.education
#
# This deploys the static Next.js export (`site/out/`) via Workers Static Assets.
# No Worker script is needed because the site is fully static — Pagefind handles
# search client-side, and Next is configured with `output: 'export'`.
#
# Deploy locally: `pnpm deploy` (runs build + wrangler deploy)
# Preview locally: `pnpm preview` (runs build + wrangler dev)

name = "paragon-schema-education"
compatibility_date = "2025-05-01"

[assets]
directory = "./out"
# Serve out/404.html for unmatched routes (Next static export emits this).
not_found_handling = "404-page"
# `html_handling = "auto-trailing-slash"` is the default and matches Next export.

[observability]
enabled = true
