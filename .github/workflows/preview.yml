name: Preview Deploy

# Uploads a non-promoted Worker version for each PR commit and posts the
# preview URL as a sticky comment. Production is untouched.
#
# Requirements:
#   - "Preview URLs" must be enabled on the paragon-schema-education Worker:
#     Dashboard → Worker → Settings → Domains & Routes → Preview URLs → Enable.
#   - CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets (same as deploy).

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

# Per-PR concurrency: a new push cancels the in-flight preview for that PR.
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    # Skip drafts and forks — forks don't have access to repo secrets.
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site (static export + Pagefind index)
        run: pnpm --filter @openedx-design-system/site build

      - name: Upload preview version to Cloudflare
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          command: versions upload --message "PR #${{ github.event.pull_request.number }} @ ${{ github.event.pull_request.head.sha }}"

      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cloudflare-preview
          message: |
            ### Cloudflare preview deployment

            **URL:** ${{ steps.preview.outputs.deployment-url }}
            **Commit:** `${{ github.event.pull_request.head.sha }}`

            This version is uploaded but **not promoted** — production at
            <https://open-edx-design-system-poc.schema.education> is unchanged.
            The comment updates in place on each new push.
