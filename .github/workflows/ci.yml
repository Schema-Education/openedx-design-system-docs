# schema validation now runs via @openedx-design-system/crawler validate during typecheck and tests

name: CI

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'initiative/**'
  pull_request:
    branches:
      - main
      - 'feat/**'
      - 'initiative/**'

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - name: Install dependencies
        run: pnpm install

      - name: Build site
        run: pnpm --filter @openedx-design-system/site build

      - name: Lint Markdown
        run: pnpm lint:md
        continue-on-error: true

      - name: Crawler typecheck
        run: pnpm --filter @openedx-design-system/crawler typecheck

      - name: Crawler tests
        run: pnpm --filter @openedx-design-system/crawler test

      - name: Crawler fixture ingestion (smoke test)
        run: pnpm --filter @openedx-design-system/crawler ingest:fixtures
